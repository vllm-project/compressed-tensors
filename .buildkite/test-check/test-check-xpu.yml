steps:
  - label: "Build and test on XPU"
    env: 
      IMAGE_NAME: "vllm-xpu-test:py312"
    agents:
      queue: Intel-XPU-B60
    command: |
      echo "--- Build XPU image"
      chmod +x .buildkite/test-check/scripts/image-build-xpu.sh
      .buildkite/test-check/scripts/image-build-xpu.sh
      echo "+++ Run test on XPU"
      chmod +x .buildkite/test-check/scripts/test-check-xpu.sh
      .buildkite/test-check/scripts/test-check-xpu.sh