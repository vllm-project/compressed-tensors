steps:
  - label: "Compressed-tensor tests"
    agents:
      queue: RedHat-L4-GCP

    plugins:
      - kubernetes:
          podSpec:
            nodeSelector:
              pool: L4solo

            containers:
              - name: tests
                image: buildkite/agent:latest
                command:
                  - apt-get update
                  - apt-get install -y curl
                  - curl -LsSf https://astral.sh/uv/install.sh | sh
                  - export LD_LIBRARY_PATH=/usr/local/nvidia/lib64
                  - export PATH="$HOME/.local/bin:/usr/local/nvidia/bin:$PATH"
                  - nvidia-smi
                  - uv --version

                resources:
                  limits:
                    nvidia.com/gpu: 1

                volumeMounts:
                  - name: model-cache
                    mountPath: /model-cache
                    readOnly: true
                  - name: dshm
                    mountPath: /dev/shm

            volumes:
              - name: model-cache
                persistentVolumeClaim:
                  claimName: buildkite-podpvc-ssd-blue
              - name: dshm
                emptyDir:
                  medium: Memory
